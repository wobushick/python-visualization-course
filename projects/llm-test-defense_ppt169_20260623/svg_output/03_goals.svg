<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8FAFC"/>
  <text x="60" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#94A3B8">02</text>
  <text x="100" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#1E293B">项目目标</text>
  
  <!-- Subtitle -->
  <text x="60" y="130" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#64748B">构建完整的测试辅助闭环</text>
  
  <!-- Goal flow -->
  <!-- Step 1 -->
  <rect x="60" y="180" width="200" height="140" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <circle cx="160" cy="220" r="20" fill="#0EA5E9"/>
  <text x="160" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">1</text>
  <text x="160" y="260" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">自动生成</text>
  <text x="160" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">登录测试用例</text>
  
  <!-- Arrow 1 -->
  <path d="M270 250 L290 250" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0EA5E9"/>
    </marker>
  </defs>
  
  <!-- Step 2 -->
  <rect x="300" y="180" width="200" height="140" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <circle cx="400" cy="220" r="20" fill="#0EA5E9"/>
  <text x="400" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">2</text>
  <text x="400" y="260" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">自动执行</text>
  <text x="400" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">Selenium 测试</text>
  
  <!-- Arrow 2 -->
  <path d="M510 250 L530 250" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <rect x="540" y="180" width="200" height="140" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <circle cx="640" cy="220" r="20" fill="#0EA5E9"/>
  <text x="640" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">3</text>
  <text x="640" y="260" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">自动收集</text>
  <text x="640" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">测试结果</text>
  
  <!-- Arrow 3 -->
  <path d="M750 250 L770 250" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4 -->
  <rect x="780" y="180" width="200" height="140" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <circle cx="880" cy="220" r="20" fill="#0EA5E9"/>
  <text x="880" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">4</text>
  <text x="880" y="260" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">自动生成</text>
  <text x="880" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">可视化分析</text>
  
  <!-- Arrow 4 -->
  <path d="M990 250 L1010 250" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5 -->
  <rect x="1020" y="180" width="200" height="140" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <circle cx="1120" cy="220" r="20" fill="#8B5CF6"/>
  <text x="1120" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">5</text>
  <text x="1120" y="260" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">提供统一</text>
  <text x="1120" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">操作界面</text>
  
  <!-- Loop arrow -->
  <path d="M1120 330 Q1120 400 640 400 Q160 400 160 330" stroke="url(#goalGradient)" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <text x="640" y="420" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">完整闭环</text>
  
  <!-- Key message -->
  <rect x="60" y="480" width="1160" height="100" rx="12" fill="#0EA5E9" opacity="0.05"/>
  <text x="100" y="520" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#0EA5E9">🎯 核心目标</text>
  <text x="100" y="550" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#1E293B">不是单纯调用大模型，而是构建从用例生成、自动化执行到结果可视化的完整测试辅助闭环</text>
  
  <!-- Footer -->
  <rect x="0" y="680" width="1280" height="40" fill="#F8FAFC"/>
  <text x="60" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8">基于 LLM 协同辅助自动化测试</text>
  <text x="1220" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">3 / 11</text>
</svg>
