<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8FAFC"/>
  <text x="60" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#94A3B8">03</text>
  <text x="100" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#1E293B">系统架构</text>
  
  <!-- Tech stack -->
  <text x="60" y="130" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#64748B">技术栈</text>
  
  <!-- Tech badges -->
  <rect x="60" y="150" width="100" height="32" rx="16" fill="#0EA5E9" opacity="0.1"/>
  <text x="110" y="171" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">Python</text>
  
  <rect x="170" y="150" width="120" height="32" rx="16" fill="#0EA5E9" opacity="0.1"/>
  <text x="230" y="171" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">DeepSeek API</text>
  
  <rect x="300" y="150" width="80" height="32" rx="16" fill="#0EA5E9" opacity="0.1"/>
  <text x="340" y="171" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">Gradio</text>
  
  <rect x="390" y="150" width="100" height="32" rx="16" fill="#0EA5E9" opacity="0.1"/>
  <text x="440" y="171" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">Selenium</text>
  
  <rect x="500" y="150" width="80" height="32" rx="16" fill="#0EA5E9" opacity="0.1"/>
  <text x="540" y="171" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">pytest</text>
  
  <rect x="590" y="150" width="100" height="32" rx="16" fill="#0EA5E9" opacity="0.1"/>
  <text x="640" y="171" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">pyecharts</text>
  
  <!-- Architecture diagram -->
  <text x="60" y="230" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#64748B">系统流程</text>
  
  <!-- Flow boxes -->
  <!-- DeepSeek API -->
  <rect x="60" y="260" width="180" height="80" rx="12" fill="#0EA5E9"/>
  <text x="150" y="295" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">DeepSeek API</text>
  <text x="150" y="315" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" opacity="0.8">LLM 生成用例</text>
  
  <!-- Arrow -->
  <path d="M250 300 L290 300" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0EA5E9"/>
    </marker>
  </defs>
  
  <!-- Day1 -->
  <rect x="300" y="260" width="180" height="80" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <text x="390" y="295" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">Day1</text>
  <text x="390" y="315" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">测试用例生成</text>
  
  <!-- Arrow -->
  <path d="M490 300 L530 300" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Excel/MD -->
  <rect x="540" y="260" width="180" height="80" rx="12" fill="#F59E0B" opacity="0.1"/>
  <text x="630" y="295" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#F59E0B" text-anchor="middle">Excel / MD</text>
  <text x="630" y="315" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#F59E0B" text-anchor="middle" opacity="0.8">结构化用例</text>
  
  <!-- Arrow -->
  <path d="M730 300 L770 300" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Day2 -->
  <rect x="780" y="260" width="180" height="80" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <text x="870" y="295" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">Day2</text>
  <text x="870" y="315" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Selenium 测试</text>
  
  <!-- Arrow -->
  <path d="M970 300 L1010 300" stroke="#0EA5E9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- JSON -->
  <rect x="1020" y="260" width="180" height="80" rx="12" fill="#8B5CF6" opacity="0.1"/>
  <text x="1110" y="295" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#8B5CF6" text-anchor="middle">JSON</text>
  <text x="1110" y="315" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#8B5CF6" text-anchor="middle" opacity="0.8">测试结果</text>
  
  <!-- Day3 & Day4 -->
  <rect x="300" y="400" width="260" height="100" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <text x="430" y="440" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#1E293B" text-anchor="middle">Day3</text>
  <text x="430" y="465" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Gradio 统一平台</text>
  <text x="430" y="485" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">生成 + 测试 + 手动验证</text>
  
  <rect x="620" y="400" width="260" height="100" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <text x="750" y="440" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#1E293B" text-anchor="middle">Day4</text>
  <text x="750" y="465" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">pyecharts 可视化</text>
  <text x="750" y="485" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">4 类图表分析</text>
  
  <!-- Footer -->
  <rect x="0" y="680" width="1280" height="40" fill="#F8FAFC"/>
  <text x="60" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8">基于 LLM 协同辅助自动化测试</text>
  <text x="1220" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">4 / 11</text>
</svg>
