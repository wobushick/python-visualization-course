<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8FAFC"/>
  <text x="60" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#94A3B8">05</text>
  <text x="100" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#1E293B">Day2 — Selenium 自动化测试</text>
  
  <!-- Content -->
  <text x="60" y="130" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#64748B">使用 Selenium 对登录页面执行 30 条测试用例</text>
  
  <!-- Test categories -->
  <rect x="60" y="170" width="1160" height="280" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <text x="100" y="210" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#1E293B">测试分类（30 条用例）</text>
  
  <!-- Category cards -->
  <rect x="100" y="240" width="200" height="80" rx="8" fill="#16A34A" opacity="0.1"/>
  <text x="200" y="275" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#16A34A" text-anchor="middle">正常场景</text>
  <text x="200" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">5 条</text>
  
  <rect x="320" y="240" width="200" height="80" rx="8" fill="#F59E0B" opacity="0.1"/>
  <text x="420" y="275" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#F59E0B" text-anchor="middle">用户名异常</text>
  <text x="420" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">7 条</text>
  
  <rect x="540" y="240" width="200" height="80" rx="8" fill="#DC2626" opacity="0.1"/>
  <text x="640" y="275" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#DC2626" text-anchor="middle">密码异常</text>
  <text x="640" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">7 条</text>
  
  <rect x="760" y="240" width="200" height="80" rx="8" fill="#8B5CF6" opacity="0.1"/>
  <text x="860" y="275" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#8B5CF6" text-anchor="middle">安全测试</text>
  <text x="860" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">5 条</text>
  
  <rect x="980" y="240" width="200" height="80" rx="8" fill="#0EA5E9" opacity="0.1"/>
  <text x="1080" y="275" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#0EA5E9" text-anchor="middle">边界值</text>
  <text x="1080" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">6 条</text>
  
  <!-- Features -->
  <rect x="60" y="470" width="560" height="180" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <text x="100" y="510" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#1E293B">技术特性</text>
  <text x="100" y="545" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• 自动启动 HTTP 服务器</text>
  <text x="100" y="570" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• Session 级共享浏览器实例</text>
  <text x="100" y="595" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• 失败自动截图</text>
  <text x="100" y="620" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• 结构化 JSON 结果输出</text>
  
  <!-- Output -->
  <rect x="660" y="470" width="560" height="180" rx="12" fill="#F8FAFC" filter="url(#cardShadow)"/>
  <text x="700" y="510" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#1E293B">输出文件</text>
  <text x="700" y="545" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• test_results.json（测试结果）</text>
  <text x="700" y="570" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• screenshots/（失败截图）</text>
  <text x="700" y="595" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• 支持 HEADLESS=1 无头模式</text>
  <text x="700" y="620" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">• 支持 -k 参数聚焦测试</text>
  
  <!-- Footer -->
  <rect x="0" y="680" width="1280" height="40" fill="#F8FAFC"/>
  <text x="60" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8">基于 LLM 协同辅助自动化测试</text>
  <text x="1220" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">6 / 11</text>
</svg>
