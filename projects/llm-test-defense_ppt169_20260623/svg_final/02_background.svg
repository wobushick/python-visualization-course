<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.08" />
    </filter>
  </defs>
  
  
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  
  <rect x="0" y="0" width="1280" height="80" fill="#F8FAFC" />
  <text x="60" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#94A3B8">01</text>
  <text x="100" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#1E293B">项目背景与问题</text>
  
  
  <text x="60" y="140" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#64748B">传统测试用例编写存在三个核心痛点</text>
  
  
  
  <path fill="#F8FAFC" filter="url(#cardShadow)" d="M72,180 H408 A12,12 0 0 1 420,192 V368 A12,12 0 0 1 408,380 H72 A12,12 0 0 1 60,368 V192 A12,12 0 0 1 72,180 Z" />
  <circle cx="100" y="220" r="24" fill="#0EA5E9" opacity="0.1" />
  <text x="100" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#0EA5E9" text-anchor="middle">1</text>
  <text x="100" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#0EA5E9" text-anchor="middle" dominant-baseline="middle">1</text>
  <text x="140" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#1E293B">人工编写成本高</text>
  <text x="80" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">测试用例设计依赖人工经验</text>
  <text x="80" y="305" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">耗时且效率低下</text>
  
  
  <path fill="#F8FAFC" filter="url(#cardShadow)" d="M472,180 H808 A12,12 0 0 1 820,192 V368 A12,12 0 0 1 808,380 H472 A12,12 0 0 1 460,368 V192 A12,12 0 0 1 472,180 Z" />
  <circle cx="500" cy="220" r="24" fill="#F59E0B" opacity="0.1" />
  <text x="500" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#F59E0B" text-anchor="middle" dominant-baseline="middle">2</text>
  <text x="540" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#1E293B">测试场景容易遗漏</text>
  <text x="480" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">边界值、安全测试等场景</text>
  <text x="480" y="305" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">容易被忽略</text>
  
  
  <path fill="#F8FAFC" filter="url(#cardShadow)" d="M872,180 H1208 A12,12 0 0 1 1220,192 V368 A12,12 0 0 1 1208,380 H872 A12,12 0 0 1 860,368 V192 A12,12 0 0 1 872,180 Z" />
  <circle cx="900" cy="220" r="24" fill="#8B5CF6" opacity="0.1" />
  <text x="900" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#8B5CF6" text-anchor="middle" dominant-baseline="middle">3</text>
  <text x="940" y="226" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#1E293B">测试结果缺少统一分析</text>
  <text x="880" y="280" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">结果分散，难以可视化</text>
  <text x="880" y="305" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">缺乏系统性分析</text>
  
  
  <path fill="#0EA5E9" opacity="0.05" d="M72,420 H1208 A12,12 0 0 1 1220,432 V528 A12,12 0 0 1 1208,540 H72 A12,12 0 0 1 60,528 V432 A12,12 0 0 1 72,420 Z" />
  <text x="100" y="470" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="600" fill="#0EA5E9">💡 核心洞察</text>
  <text x="100" y="500" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#1E293B">借助 LLM 的能力，提高测试用例生成效率，并把生成、执行和分析流程串联起来</text>
  
  
  <rect x="0" y="680" width="1280" height="40" fill="#F8FAFC" />
  <text x="60" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8">基于 LLM 协同辅助自动化测试</text>
  <text x="1220" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">2 / 11</text>
</svg>