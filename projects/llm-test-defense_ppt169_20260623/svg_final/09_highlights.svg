<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.08" />
    </filter>
  </defs>
  
  
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  
  <rect x="0" y="0" width="1280" height="80" fill="#F8FAFC" />
  <text x="60" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#94A3B8">08</text>
  <text x="100" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#1E293B">项目亮点</text>
  
  
  <text x="60" y="130" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#64748B">四大核心亮点</text>
  
  
  
  <path fill="#F8FAFC" filter="url(#cardShadow)" d="M72,170 H608 A12,12 0 0 1 620,182 V358 A12,12 0 0 1 608,370 H72 A12,12 0 0 1 60,358 V182 A12,12 0 0 1 72,170 Z" />
  <path fill="#0EA5E9" d="M64,170 H64 A4,4 0 0 1 68,174 V366 A4,4 0 0 1 64,370 H64 A4,4 0 0 1 60,366 V174 A4,4 0 0 1 64,170 Z" />
  <text x="100" y="220" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#1E293B">🤖 LLM 辅助测试设计</text>
  <text x="100" y="260" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">利用大模型快速生成多类型测试用例</text>
  <text x="100" y="285" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">减少人工编写成本，提高测试设计效率</text>
  <text x="100" y="310" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">通过固定输出格式和解析逻辑保证质量</text>
  
  
  <path fill="#F8FAFC" filter="url(#cardShadow)" d="M672,170 H1208 A12,12 0 0 1 1220,182 V358 A12,12 0 0 1 1208,370 H672 A12,12 0 0 1 660,358 V182 A12,12 0 0 1 672,170 Z" />
  <path fill="#F59E0B" d="M664,170 H664 A4,4 0 0 1 668,174 V366 A4,4 0 0 1 664,370 H664 A4,4 0 0 1 660,366 V174 A4,4 0 0 1 664,170 Z" />
  <text x="700" y="220" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#1E293B">🔄 自动化测试闭环</text>
  <text x="700" y="260" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">从用例生成、测试执行、结果保存到可视化分析</text>
  <text x="700" y="285" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">形成完整流程，非单纯调用大模型</text>
  <text x="700" y="310" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">每个环节都有结构化数据输出</text>
  
  
  <path fill="#F8FAFC" filter="url(#cardShadow)" d="M72,390 H608 A12,12 0 0 1 620,402 V578 A12,12 0 0 1 608,590 H72 A12,12 0 0 1 60,578 V402 A12,12 0 0 1 72,390 Z" />
  <path fill="#8B5CF6" d="M64,390 H64 A4,4 0 0 1 68,394 V586 A4,4 0 0 1 64,590 H64 A4,4 0 0 1 60,586 V394 A4,4 0 0 1 64,390 Z" />
  <text x="100" y="440" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#1E293B">🎯 教学演示友好</text>
  <text x="100" y="480" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">通过 Gradio 提供统一界面</text>
  <text x="100" y="505" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">降低操作门槛，无需命令行切换</text>
  <text x="100" y="530" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">适合教学演示和小型项目使用</text>
  
  
  <path fill="#F8FAFC" filter="url(#cardShadow)" d="M672,390 H1208 A12,12 0 0 1 1220,402 V578 A12,12 0 0 1 1208,590 H672 A12,12 0 0 1 660,578 V402 A12,12 0 0 1 672,390 Z" />
  <path fill="#16A34A" d="M664,390 H664 A4,4 0 0 1 668,394 V586 A4,4 0 0 1 664,590 H664 A4,4 0 0 1 660,586 V394 A4,4 0 0 1 664,390 Z" />
  <text x="700" y="440" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="600" fill="#1E293B">📊 结果可追踪</text>
  <text x="700" y="480" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">每条测试记录输入、状态、输出和耗时</text>
  <text x="700" y="505" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">通过 pyecharts 可视化分析测试覆盖情况</text>
  <text x="700" y="530" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#64748B">帮助发现测试分布是否均衡</text>
  
  
  <rect x="0" y="680" width="1280" height="40" fill="#F8FAFC" />
  <text x="60" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8">基于 LLM 协同辅助自动化测试</text>
  <text x="1220" y="705" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94A3B8" text-anchor="end">9 / 11</text>
