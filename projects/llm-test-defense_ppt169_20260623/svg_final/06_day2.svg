  <path fill="#16A34A" opacity="0.1" d="M108,240 H292 A8,8 0 0 1 300,248 V312 A8,8 0 0 1 292,320 H108 A8,8 0 0 1 100,312 V248 A8,8 0 0 1 108,240 Z" />
