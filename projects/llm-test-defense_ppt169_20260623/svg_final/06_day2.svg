  <text x="100" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#1E293B">Day2 — Selenium 自动化测试</text>
  
  
  <text x="60" y="130" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#64748B">使用 Selenium 对登录页面执行 30 条测试用例</text>
  
  
