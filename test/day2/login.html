<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全访问</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════
           CSS VARIABLES
           ══════════════════════════════════════ */
        :root {
            --bg-deep:    #04060d;
            --bg-surface: rgba(8, 14, 30, 0.85);
            --border:     rgba(56, 189, 248, 0.12);
            --border-glow: rgba(56, 189, 248, 0.25);
            --cyan:       #38bdf8;
            --cyan-dim:   rgba(56, 189, 248, 0.4);
            --cyan-deep:  rgba(56, 189, 248, 0.08);
            --amber:      #f59e0b;
            --amber-dim:  rgba(245, 158, 11, 0.5);
            --red:        #ef4444;
            --green:      #22c55e;
            --text:       #e2e8f0;
            --text-dim:   #64748b;
            --text-mute:  #475569;
            --mono:       'JetBrains Mono', monospace;
            --display:    'Rajdhani', sans-serif;
        }

        /* ══════════════════════════════════════
           RESET & BASE
           ══════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            font-family: var(--display);
            color: var(--text);
            overflow: hidden;
        }

        /* ══════════════════════════════════════
           ANIMATED BACKGROUND
           ══════════════════════════════════════ */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.06) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glowPulse 6s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        /* scan line */
        .scanline {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(56, 189, 248, 0.015) 2px,
                rgba(56, 189, 248, 0.015) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* ══════════════════════════════════════
           CARD
           ══════════════════════════════════════ */
        .card-wrapper {
            position: relative;
            z-index: 1;
            width: 440px;
            max-width: 92vw;
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* animated border */
        .card-wrapper::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 18px;
            background: conic-gradient(from var(--angle, 0deg),
                transparent 30%,
                var(--cyan-dim) 50%,
                transparent 70%
            );
            opacity: 0.5;
            animation: borderRotate 6s linear infinite;
            z-index: -1;
        }
        @keyframes borderRotate {
            to { --angle: 360deg; }
        }
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 17px;
            padding: 44px 40px 36px;
            backdrop-filter: blur(24px);
            position: relative;
            overflow: hidden;
        }

        /* corner accents */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--cyan-dim);
            border-style: solid;
        }
        .card::before {
            top: 12px; left: 12px;
            border-width: 2px 0 0 2px;
        }
        .card::after {
            bottom: 12px; right: 12px;
            border-width: 0 2px 2px 0;
        }

        /* ══════════════════════════════════════
           HEADER
           ══════════════════════════════════════ */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: var(--cyan-deep);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            position: relative;
        }
        .header .icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 18px;
            border: 1px solid rgba(56, 189, 248, 0.1);
        }
        .header .icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--cyan);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .header h1 {
            font-family: var(--display);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 6px;
        }
        .header p {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ══════════════════════════════════════
           FORM FIELDS
           ══════════════════════════════════════ */
        .field {
            margin-bottom: 18px;
            opacity: 0;
            animation: fieldReveal 0.5s ease forwards;
        }
        .field:nth-child(1) { animation-delay: 0.3s; }
        .field:nth-child(2) { animation-delay: 0.45s; }
        @keyframes fieldReveal {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .field label .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--cyan);
            opacity: 0.6;
        }

        .field .input-wrap {
            position: relative;
        }
        .field input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .field input::placeholder {
            color: var(--text-mute);
            font-family: var(--mono);
            font-size: 13px;
        }
        .field input:focus {
            border-color: var(--cyan-dim);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.08), inset 0 0 20px rgba(56, 189, 248, 0.03);
        }

        .field .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            stroke: var(--text-mute);
            fill: none;
            stroke-width: 1.5;
            transition: stroke 0.3s ease;
            pointer-events: none;
        }
        .field input:focus ~ .input-icon {
            stroke: var(--cyan);
        }

        /* ══════════════════════════════════════
           BUTTON
           ══════════════════════════════════════ */
        .btn-wrap {
            margin-top: 24px;
            opacity: 0;
            animation: fieldReveal 0.5s ease forwards;
            animation-delay: 0.6s;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--cyan) 0%, #0ea5e9 100%);
            border: none;
            border-radius: 10px;
            color: var(--bg-deep);
            font-family: var(--display);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .btn:hover::before { transform: translateX(100%); }
        .btn:hover {
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3), 0 0 60px rgba(56, 189, 248, 0.1);
            transform: translateY(-1px);
        }
        .btn:active { transform: translateY(0); }

        /* ══════════════════════════════════════
           OUTPUT
           ══════════════════════════════════════ */
        .output {
            margin-top: 20px;
            padding: 16px 18px;
            border-radius: 10px;
            border: 1px solid transparent;
            display: none;
            animation: outputReveal 0.35s ease;
        }
        @keyframes outputReveal {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .output.show { display: block; }

        .output.success {
            background: rgba(34, 197, 94, 0.06);
            border-color: rgba(34, 197, 94, 0.2);
        }
        .output.fail {
            background: rgba(239, 68, 68, 0.06);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .output .status {
            font-family: var(--display);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .output.success .status { color: var(--green); }
        .output.fail .status { color: var(--red); }

        .output .message {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        /* glitch on error */
        .output.fail { animation: glitch 0.4s ease; }
        @keyframes glitch {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-4px); }
            20% { transform: translateX(4px); }
            30% { transform: translateX(-2px); }
            40% { transform: translateX(2px); }
            50% { transform: translateX(0); }
        }

        /* ══════════════════════════════════════
           TEST ACCOUNTS
           ══════════════════════════════════════ */
        .accounts {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            opacity: 0;
            animation: fieldReveal 0.5s ease forwards;
            animation-delay: 0.75s;
        }
        .accounts-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-mute);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }
        .accounts-title .line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .accounts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .chip::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--cyan-deep) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .chip:hover::before { opacity: 1; }
        .chip:hover {
            border-color: var(--cyan-dim);
            transform: translateY(-1px);
        }
        .chip .chip-user {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--cyan);
        }
        .chip .chip-sep {
            color: var(--text-mute);
            font-family: var(--mono);
            font-size: 10px;
        }
        .chip .chip-pass {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .chip.filling {
            border-color: var(--amber-dim);
            background: rgba(245, 158, 11, 0.06);
        }
        .chip.filling .chip-user { color: var(--amber); }

        /* ══════════════════════════════════════
           STATUS BAR
           ══════════════════════════════════════ */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 32px;
            background: rgba(8, 14, 30, 0.9);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-mute);
            z-index: 50;
        }
        .status-bar .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-bar span { letter-spacing: 1px; text-transform: uppercase; }
        .status-bar .right { margin-left: auto; }

        /* ══════════════════════════════════════
           RESPONSIVE
           ══════════════════════════════════════ */
        @media (max-width: 480px) {
            .card { padding: 32px 24px 28px; }
            .header h1 { font-size: 22px; letter-spacing: 2px; }
            .accounts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="scanline"></div>

    <div class="card-wrapper">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="icon">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <h1>安全访问</h1>
                <p>请输入凭证以继续</p>
            </div>

            <!-- Form -->
            <form id="loginForm" autocomplete="off">
                <div class="field">
                    <label><span class="dot"></span> 用户名</label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="请输入用户名" data-testid="username">
                        <svg class="input-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="field">
                    <label><span class="dot"></span> 密码</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="请输入密码" data-testid="password">
                        <svg class="input-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                </div>

                <div class="btn-wrap">
                    <button type="submit" class="btn">登录认证</button>
                </div>
            </form>

            <!-- Output -->
            <div class="output" id="output">
                <div class="status" id="status"></div>
                <div class="message" id="message"></div>
            </div>

            <!-- Test Accounts -->
            <div class="accounts">
                <div class="accounts-title">
                    <span>测试账号</span>
                    <span class="line"></span>
                </div>
                <div class="accounts-grid">
                    <div class="chip" data-u="alice" data-p="Pass1234">
                        <span class="chip-user">alice</span>
                        <span class="chip-sep">/</span>
                        <span class="chip-pass">Pass1234</span>
                    </div>
                    <div class="chip" data-u="bob_01" data-p="Abcdef1!">
                        <span class="chip-user">bob_01</span>
                        <span class="chip-sep">/</span>
                        <span class="chip-pass">Abcdef1!</span>
                    </div>
                    <div class="chip" data-u="admin" data-p="Admin123">
                        <span class="chip-user">admin</span>
                        <span class="chip-sep">/</span>
                        <span class="chip-pass">Admin123</span>
                    </div>
                    <div class="chip" data-u="test_user" data-p="Test1234">
                        <span class="chip-user">test_user</span>
                        <span class="chip-sep">/</span>
                        <span class="chip-pass">Test1234</span>
                    </div>
                    <div class="chip" data-u="charlie" data-p="Charlie1">
                        <span class="chip-user">charlie</span>
                        <span class="chip-sep">/</span>
                        <span class="chip-pass">Charlie1</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-dot"></div>
        <span>系统在线</span>
        <span class="right">协议 v2.0</span>
    </div>

    <script>
        // ── 用户数据库 ──
        const VALID_USERS = {
            alice:     "Pass1234",
            bob_01:    "Abcdef1!",
            admin:     "Admin123",
            test_user: "Test1234",
            charlie:   "Charlie1",
        };

        // ── 快捷填入 ──
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const u = chip.dataset.u;
                const p = chip.dataset.p;
                const uInput = document.getElementById('username');
                const pInput = document.getElementById('password');

                // highlight effect
                chip.classList.add('filling');
                setTimeout(() => chip.classList.remove('filling'), 600);

                // typewriter fill
                uInput.value = '';
                pInput.value = '';
                let i = 0;
                const type = () => {
                    if (i < u.length) { uInput.value += u[i++]; setTimeout(type, 30); }
                    else { fillPass(0); }
                };
                const fillPass = (j) => {
                    if (j < p.length) { pInput.value += p[j++]; setTimeout(() => fillPass(j), 20); }
                };
                type();
            });
        });

        // ── 验证逻辑 ──
        function validate(username, password) {
            if (!username.trim()) return { ok: false, msg: "用户名不能为空" };
            if (!password.trim()) return { ok: false, msg: "密码不能为空" };

            username = username.trim();
            password = password.trim();

            if (username.length < 3) return { ok: false, msg: "用户名长度不能少于3位" };
            if (username.length > 20) return { ok: false, msg: "用户名长度不能超过20位" };
            if (!/^[a-zA-Z0-9_]+$/.test(username)) return { ok: false, msg: "用户名只能包含字母、数字和下划线" };

            if (password.length < 8) return { ok: false, msg: "密码长度不能少于8位" };
            if (password.length > 20) return { ok: false, msg: "密码长度不能超过20位" };
            if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+$/.test(password)) return { ok: false, msg: "密码必须包含大小写字母和数字" };

            const sql = ["' OR ", "'; --", "DROP ", "DELETE ", "UNION SELECT", "1=1"];
            for (const pat of sql) {
                if (username.toLowerCase().includes(pat.toLowerCase()) ||
                    password.toLowerCase().includes(pat.toLowerCase()))
                    return { ok: false, msg: "检测到非法输入" };
            }

            const xss = ["<script", "javascript:", "onerror=", "onclick="];
            for (const pat of xss) {
                if (username.toLowerCase().includes(pat.toLowerCase()) ||
                    password.toLowerCase().includes(pat.toLowerCase()))
                    return { ok: false, msg: "检测到非法输入" };
            }

            if (username in VALID_USERS) {
                return VALID_USERS[username] === password
                    ? { ok: true, msg: `欢迎回来，${username}！` }
                    : { ok: false, msg: "密码错误" };
            }
            return { ok: false, msg: "用户不存在" };
        }

        // ── 提交 ──
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const result = validate(
                document.getElementById("username").value,
                document.getElementById("password").value
            );

            const output = document.getElementById("output");
            const status = document.getElementById("status");
            const message = document.getElementById("message");

            // reset animation
            output.classList.remove("show", "success", "fail");
            void output.offsetWidth;

            output.classList.add("show", result.ok ? "success" : "fail");
            status.textContent = result.ok ? "✓ 访问通过" : "✗ 访问拒绝";
            message.textContent = result.msg;
        });
    </script>
</body>
</html>
